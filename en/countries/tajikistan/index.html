function det(seed){var x=Math.sin(seed*12.9898)*43758.5453;return x-Math.floor(x)}
function mockForecast(lat,lng,elev){
  var now=new Date();
  var start=Date.UTC(now.getUTCFullYear(),0,0);
  var doy=Math.floor((now.getTime()-start)/86400000);
  var hemi=lat>=0?1:-1;
  var seasonal=Math.cos(((doy-200)/365)*2*Math.PI)*hemi;
  var seaTemp=27-Math.abs(lat)*0.55+seasonal*12;
  var base=seaTemp-(elev/100)*0.6;
  var seedBase=lat*7+lng*13+doy;
  var codes=[0,1,2,3,61,71,95];
  var daily=[];
  for(var i=0;i<7;i++){
    var r1=det(seedBase+i*3.1),r2=det(seedBase+i*5.7+1),r3=det(seedBase+i*9.3+2);
    var swing=(r1-0.5)*6;
    var dt=new Date(now.getTime()+i*86400000);
    daily.push({date:dt.toISOString().slice(0,10),minC:Math.round((base+swing-4)*10)/10,maxC:Math.round((base+swing+4)*10)/10,pp:Math.round(r2*80),wind:Math.round((3+r3*15)*10)/10,code:codes[Math.floor(r2*codes.length)]||2});
  }
  return {daily:daily,cur:{t:Math.round(((daily[0].minC+daily[0].maxC)/2)*10)/10,wind:daily[0].wind,code:daily[0].code},sr:"05:12",ss:"18:47"};
}

function filterMountains(f){
  var q=(f.q||"").trim().toLowerCase();
  var list=DATA.mountains.filter(function(m){
    if(m.status!=="published")return false;
    if(f.country&&m.countryId!==f.country)return false;
    if(f.diff&&m.difficultyLevel!==Number(f.diff))return false;
    if(f.elev){var b=BANDS[f.elev];if(m.elevationM<b[0]||m.elevationM>b[1])return false}
    if(f.tag&&(m.tags||[]).indexOf(f.tag)<0)return false;
    if(q&&textOf(m).indexOf(q)<0&&m.slug.indexOf(q)<0)return false;
    return true;
  });
  var s=f.sort||"elevD";
  list.sort(function(a,b){
    if(s==="elevA")return a.elevationM-b.elevationM;
    if(s==="diffA")return a.difficultyLevel-b.difficultyLevel||b.elevationM-a.elevationM;
    if(s==="diffD")return b.difficultyLevel-a.difficultyLevel||b.elevationM-a.elevationM;
    if(s==="name")return tr(a).name.localeCompare(tr(b).name,state.locale);

}

var BASE=(function(){
  var p=location.pathname;

  if(m)return m[1];

function pathFor(view,locale){
  var l=locale||state.locale,n=view.name;
  if(n==="mountain")return "/"+l+"/mountains/"+view.slug+"/";
  if(n==="route")return "/"+l+"/routes/"+view.slug+"/";
  if(n==="ranking")return "/"+l+"/rankings/"+view.slug+"/";
  if(n==="article")return "/"+l+"/articles/"+view.slug+"/";
  if(n==="legal")return "/"+l+"/legal/"+view.slug+"/";
  if(n==="thread")return "/"+l+"/community/?t="+encodeURIComponent(view.slug);
  if(n==="country")return "/"+l+"/countries/"+view.slug+"/";

  var map={home:"/",mountains:"/mountains/",rankings:"/rankings/",articles:"/articles/",videos:"/videos/",community:"/community/",about:"/about/",countries:"/countries/",climbers:"/climbers/"};
  return "/"+l+(map[n]||"/");

function go(view){
  if(view.name==="mountains"){state.filters={q:view.q||"",country:view.country||"",elev:"",diff:"",tag:"",sort:"elevD"}}

  render();window.scrollTo(0,0);
}
function parseHash(){
  // µŚ¦ŃāÅŃāāŃéĘŃāźURLõ║ÆµÅø’╝ł#/ja/mountain/x ŌåÆ /ja/mountains/x/ ŃüĖń¦╗ĶĪī’╝ē
  var h=(location.hash||"").replace(/^#\/?/,"");
  if(h){
    var hp=h.split("/");
    if(hp[0]==="ja"||hp[0]==="en"){state.locale=hp[0];hp.shift()}
    var nm=hp[0]||"home";
    var valid={home:1,mountains:1,mountain:1,route:1,rankings:1,ranking:1,articles:1,article:1,community:1,thread:1,videos:1,legal:1,about:1};
    state.view=valid[nm]?{name:nm,slug:hp[1]}:{name:"home"};
    try{history.replaceState(null,"",BASE+pathFor(state.view))}catch(e){}
    return;
  }
  var rest=location.pathname.slice(BASE.length);
  var seg=rest.split("/").filter(function(s){return s&&s!=="index.html"});
  if(seg[0]==="ja"||seg[0]==="en"){state.locale=seg[0];seg.shift()}
  var name=seg[0]||"home",slug=seg[1];
  if(name==="mountains"&&slug){state.view={name:"mountain",slug:slug};return}
  if(name==="routes"&&slug){state.view={name:"route",slug:slug};return}
  if(name==="rankings"&&slug){state.view={name:"ranking",slug:slug};return}
  if(name==="articles"&&slug){state.view={name:"article",slug:slug};return}
  if(name==="legal"&&slug){state.view={name:"legal",slug:slug};return}
  if(name==="countries"&&slug){state.view={name:"country",slug:slug};return}
  if(name==="regions"&&slug){state.view={name:"region",slug:slug};return}
  if(name==="community"){
    var t=null;
    try{t=new URLSearchParams(location.search).get("t")}catch(e){}
    state.view=t?{name:"thread",slug:t}:{name:"community"};
    return;
  }
  var valid2={home:1,mountains:1,rankings:1,articles:1,videos:1,about:1,countries:1,climbers:1};
  state.view=valid2[name]?{name:name}:{name:"home"};
}

}

function comStore(){try{return JSON.parse(localStorage.getItem("mp-com-v1"))||{}}catch(e){return{}}}

function comAll(){
  var s=comStore();
  var mine=s.threads||[];
  return COM_SEED.concat(mine).map(function(t){
    var extra=(s.replies&&s.replies[t.id])||[];
    return {t:t,replies:(t.replies||[]).concat(extra),likes:(t.likes||0)+((s.likes||{})[t.id]?1:0),liked:!!((s.likes||{})[t.id]),mine:mine.indexOf(t)>=0};

function comLastAct(x){var last=x.t.createdAt;x.replies.forEach(function(r){if(r.createdAt>last)last=r.createdAt});return last}
function comTime(iso){
  var C=d().com,diff=(Date.now()-new Date(iso).getTime())/60000;
  if(diff<1)return C.justNow;
  if(diff<60)return Math.floor(diff)+C.minAgo;
  if(diff<1440)return Math.floor(diff/60)+C.hourAgo;
  return Math.floor(diff/1440)+C.dayAgo;
}

function comToggleForm(show){
  var f=document.getElementById("comForm");
  if(!f)return;
  var willShow=show!==undefined?show:f.style.display==="none";
  f.style.display=willShow?"block":"none";
  if(willShow){var el=document.getElementById("cfTitle");if(el)el.focus()}
}
function comSubmit(){
  var C=d().com;
  var name=(document.getElementById("cfName").value.trim()||C.guest).slice(0,20);
  var title=document.getElementById("cfTitle").value.trim();
  var body=document.getElementById("cfBody").value.trim();
  var cat=document.getElementById("cfCat").value;
  if(!title||!body){document.getElementById(!title?"cfTitle":"cfBody").focus();return}
  var s=comStore();
  s.name=name;
  s.threads=s.threads||[];
  var id="th_u_"+Date.now().toString(36);
  s.threads.push({id:id,cat:cat,author:name,createdAt:new Date().toISOString(),likes:0,title:title.slice(0,100),body:body.slice(0,2000),replies:[]});
  comSave(s);
  go({name:"thread",slug:id});
}
function comReply(tid){
  var C=d().com;
  var name=(document.getElementById("crName").value.trim()||C.guest).slice(0,20);
  var body=document.getElementById("crBody").value.trim();
  if(!body){document.getElementById("crBody").focus();return}
  var s=comStore();
  s.name=name;
  s.replies=s.replies||{};
  (s.replies[tid]=s.replies[tid]||[]).push({author:name,createdAt:new Date().toISOString(),body:body.slice(0,2000)});
  comSave(s);
  render();
}
function comLike(tid){
  var s=comStore();
  s.likes=s.likes||{};
  if(s.likes[tid])delete s.likes[tid];else s.likes[tid]=true;
  comSave(s);
  render();
}
function comReport(tid){
  var s=comStore();
  s.reported=s.reported||{};
  s.reported[tid]=true;
  comSave(s);
  render();
}
